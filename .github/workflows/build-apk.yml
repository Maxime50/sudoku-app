name: Build Android APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory '*'

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: /root/.buildozer
          key: buildozer-global-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-global-${{ runner.os }}-

      - name: Cache Buildozer project directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-project-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-project-${{ runner.os }}-

      - name: Cache Buildozer project directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-project-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-project-${{ runner.os }}-

      # --- LIGNE AJOUTÉE ICI ---
      - name: Fix Cython version for Kivy
        run: pip install "cython==0.29.36"

      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
        run: yes | buildozer android debug
        
      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
        run: yes | buildozer android debug

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sudoku-apk
          path: bin/*.apk
          retention-days: 30
